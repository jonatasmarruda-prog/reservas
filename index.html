<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Trilheiros de Rondonópolis</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:#050505;
color:white;
}

header{

background:url("https://i.postimg.cc/4dJGZK5m/C%C3%B3pia_de_Red_and_White_Modern_Travel_Promotion_Instagram_Post.png");
background-size:cover;
background-position:center;

padding:120px 20px;
text-align:center;

}

header h1{

font-size:42px;
background:rgba(0,0,0,0.6);
display:inline-block;
padding:20px 40px;
border-radius:10px;

}

.container{
max-width:1200px;
margin:auto;
padding:40px 20px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:30px;
}

.card{

background:#111;
border-radius:15px;
overflow:hidden;

box-shadow:0 15px 40px rgba(0,0,0,0.8);

transition:0.3s;

}

.card:hover{
transform:translateY(-8px);
}

.card img{
width:100%;
height:220px;
object-fit:cover;
}

.card .info{
padding:25px;
text-align:center;
}

button{

background:#00b894;
border:none;

padding:14px 30px;

border-radius:8px;

color:white;

font-size:16px;

cursor:pointer;

margin:6px;

box-shadow:0 6px #007a5e;

}

button:active{
transform:translateY(2px);
box-shadow:0 2px #007a5e;
}

.voltar{
background:#333;
}

.section{

padding:40px 20px;
text-align:center;

}

input{

padding:10px;

border:none;

border-radius:6px;

margin:5px;

}

.vagas{

color:#00ff9c;

font-weight:bold;

font-size:18px;

}

footer{

text-align:center;

padding:40px;

color:#aaa;

}

</style>

</head>

<body>

<header>

<h1>🌿 Trilheiros de Rondonópolis</h1>

</header>

<div class="container">

<div class="grid" id="inicio">

<div class="card">

<img src="https://i.postimg.cc/7YJ6Yp7c/Lagoa-Azul.png">

<div class="info">

<h2>Lagoa Azul</h2>

<p>Primavera do Leste – MT</p>

<button onclick="mostrar('Lagoa Azul')">

Ver detalhes

</button>

</div>

</div>

<div class="card">

<img src="https://i.postimg.cc/4dJGZK5m/C%C3%B3pia_de_Red_and_White_Modern_Travel_Promotion_Instagram_Post.png">

<div class="info">

<h2>Vale do Chico</h2>

<p>Jaciara – MT</p>

<button onclick="mostrar('Vale do Chico')">

Ver detalhes

</button>

</div>

</div>

<div class="card">

<img src="https://i.postimg.cc/j2YtqL1j/Rafting_em_Jaciara_aventura_nas_%C3%A1guas.png">

<div class="info">

<h2>Rafting em Jaciara</h2>

<p>Rio Tenente Amaral</p>

<button onclick="mostrar('Rafting em Jaciara')">

Ver detalhes

</button>

</div>

</div>

</div>

<div id="detalhes"></div>

</div>

<footer>

<p>Após realizar o pagamento envie o comprovante no WhatsApp</p>

<p>📲 66 99692-6174</p>

</footer>

<script>

let vagas={
"Lagoa Azul":28,
"Vale do Chico":28,
"Rafting em Jaciara":28
}

function copiarPix(){

navigator.clipboard.writeText("trilheiros.roomt@gmail.com")

alert("PIX copiada!")

}

function voltar(){

document.getElementById("detalhes").innerHTML=""

document.getElementById("inicio").style.display="grid"

}

function enviar(tipo){

let nome=document.getElementById("nome").value

if(nome==""){
alert("Digite seu nome")
return
}

vagas[tipo]--

let mensagem="Olá! Meu nome é "+nome+"%0A"+
"Passeio: "+tipo+"%0A"+
"Após pagamento clico para enviar comprovante no WhatsApp."

window.open("https://wa.me/5566996926174?text="+mensagem)

voltar()

}

function mostrar(tipo){

document.getElementById("inicio").style.display="none"

let info=""

if(tipo=="Lagoa Azul"){

info=`

<h2>Lagoa Azul</h2>

<p class="vagas">Vagas restantes: ${vagas[tipo]}</p>

<p>

✔ Transporte ida e volta<br>
✔ Entrada no atrativo<br>
✔ Snorkel<br>
✔ Colete salva-vidas<br>
✔ Seguro de vida<br>
✔ Guia de turismo

</p>

<p>

Adulto PIX 336<br>
Cartão 340<br>
Criança até 10 anos 280<br>
Veículo próprio 215

</p>

<a href="https://mpago.li/2yrVFJQ">
<button>Cartão</button>
</a>

`

}

if(tipo=="Vale do Chico"){

info=`

<h2>Vale do Chico</h2>

<p class="vagas">Vagas restantes: ${vagas[tipo]}</p>

<p>

✔ Transporte<br>
✔ Café da manhã<br>
✔ Almoço<br>
✔ Seguro de vida

</p>

<p>

Individual PIX 365<br>
Cartão 379<br>
Casal PIX 700<br>
Cartão 729<br>
Criança PIX 295<br>
Cartão 309

</p>

<a href="https://mpago.li/2HA5tTm">
<button>Cartão Individual</button>
</a>

<a href="https://mpago.li/1YDjw3N">
<button>Cartão Casal</button>
</a>

`

}

if(tipo=="Rafting em Jaciara"){

info=`

<h2>Rafting em Jaciara</h2>

<p class="vagas">Vagas restantes: ${vagas[tipo]}</p>

<p>

✔ Transporte<br>
✔ Equipamentos de segurança<br>
✔ Guia especializado<br>
✔ Seguro

</p>

<p>

PIX 325<br>
Cartão 335

</p>

<a href="https://mpago.li/33bGqHg">
<button>Cartão</button>
</a>

`

}

document.getElementById("detalhes").innerHTML=`

<section class="section">

${info}

<br>

<input id="nome" placeholder="Digite seu nome">

<br>

<button onclick="copiarPix()">Copiar PIX</button>

<button onclick="enviar('${tipo}')">

Após pagamento clique para enviar comprovante no WhatsApp

</button>

<br>

<button class="voltar" onclick="voltar()">

Voltar

</button>

</section>

`

}

</script>

</body>

</html>
